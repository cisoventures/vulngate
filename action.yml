name: "vulngate"
description: "Agent-neutral security checks before you ship — SAST, secrets, and dependency audit as a merge gate."
branding:
  icon: "shield"
  color: "red"

inputs:
  paths:
    description: "Path to scan"
    default: "."
  fail-on:
    description: "Severity threshold that fails the check (critical|high|medium|low)"
    default: "high"
  config:
    description: "Path to a vulngate config file (optional)"
    default: ""
  comment:
    description: "Post/update a single PR comment with findings"
    default: "true"
  upload-sarif:
    description: "Upload SARIF to the GitHub Security tab"
    default: "true"
  diff-only:
    description: "Limit findings to files changed in this PR (focus the comment/gate; avoids failing on pre-existing debt)"
    default: "false"
  ignore-dev-deps:
    description: "Don't fail the gate on build-only (dev) dependency flaws — they're still reported. Recommended for app teams where the build toolchain isn't shipped."
    default: "false"
  install-gitleaks:
    description: "Install gitleaks for secret scanning"
    default: "true"
  anthropic-api-key:
    description: "OPTIONAL — your own Anthropic API key for LLM triage (BYO-inference). Empty = skipped, free tier stays fully useful."
    default: ""
  anthropic-model:
    description: "Model for LLM triage when a key is provided"
    default: "claude-opus-4-8"

runs:
  using: "composite"
  steps:
    # Third-party actions are SHA-pinned (not float tags) so a compromised or
    # retagged release can't silently enter the supply chain. `# vX` is the
    # human-readable ref the SHA corresponds to.
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: "3.12"

    - name: Install vulngate + scanners
      shell: bash
      # Install vulngate from the action's own checkout (always the version pinned
      # by the `uses:` ref), then pin the Python scanners EXACTLY to the versions CI
      # tests against — reproducible runs, no surprise scanner upgrade mid-release.
      run: pip install "${{ github.action_path }}" semgrep==1.171.0 pip-audit==2.10.1

    - name: Install gitleaks
      if: inputs.install-gitleaks == 'true'
      shell: bash
      env:
        GITLEAKS_VERSION: "8.30.1"   # pinned; sha256 hardcoded below (not fetched from the release)
      run: |
        set -euo pipefail
        # Hardcode the expected sha256 rather than trusting the release's own
        # checksums.txt — that defends against a tampered/compromised release,
        # which a self-referential checksum file would happily validate.
        case "$(uname -m)" in
          x86_64)          arch="x64";   sum="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb" ;;
          aarch64|arm64)   arch="arm64"; sum="e4a487ee7ccd7d3a7f7ec08657610aa3606637dab924210b3aee62570fb4b080" ;;
          *) echo "vulngate: unsupported arch $(uname -m) for pinned gitleaks; set install-gitleaks=false to skip" >&2; exit 1 ;;
        esac
        file="gitleaks_${GITLEAKS_VERSION}_linux_${arch}.tar.gz"
        base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
        curl -sSfL "$base/$file" -o "$file"
        echo "${sum}  ${file}" | sha256sum -c -
        tar -xzf "$file" -C /usr/local/bin gitleaks
        gitleaks version

    - name: Scan
      id: scan
      shell: bash
      env:                          # inputs via env, never interpolated into the shell
        VG_PATHS: ${{ inputs.paths }}
        VG_FAIL_ON: ${{ inputs.fail-on }}
        VG_CONFIG: ${{ inputs.config }}
        VG_IGNORE_DEV_DEPS: ${{ inputs.ignore-dev-deps }}
      run: |
        set +e
        # SARIF is generated LATER, from the final findings.json (post diff-filter
        # and triage), so the Security tab matches the PR comment and the gate.
        args=(scan "$VG_PATHS" --fail-on "$VG_FAIL_ON" --json findings.json --no-color)
        [ -n "$VG_CONFIG" ] && args+=(--config "$VG_CONFIG")
        [ "$VG_IGNORE_DEV_DEPS" = "true" ] && args+=(--ignore-dev-deps)
        vulngate "${args[@]}"
        # The gate step re-reads this policy from findings.json, so it stays consistent.
        echo "scan_exit=$?" >> "$GITHUB_OUTPUT"

    - name: Diff filter (PR-changed files only)
      if: inputs.diff-only == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: python "${{ github.action_path }}/action/scripts/diff_filter.py" findings.json

    - name: LLM triage (optional, BYO key)
      if: inputs.anthropic-api-key != ''
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        ANTHROPIC_MODEL: ${{ inputs.anthropic-model }}
      run: |
        pip install anthropic==0.118.0 >/dev/null   # pinned for reproducibility
        python "${{ github.action_path }}/action/scripts/triage.py" findings.json

    - name: Generate SARIF (from final findings.json)
      if: inputs.upload-sarif == 'true' && always()
      shell: bash
      # Project the FINAL findings.json to SARIF so code-scanning reflects the same
      # findings as the gate/comment (after diff-filter + triage). Best-effort.
      run: |
        vulngate sarif findings.json --out vulngate.sarif || echo "vulngate - SARIF generation skipped (no findings.json)"

    - name: Check code scanning availability
      id: codescanning
      if: inputs.upload-sarif == 'true' && always()
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      # Uploading SARIF needs a PUBLIC repo (code scanning is free there) or GitHub
      # Advanced Security on a private repo. Without it the upload hard-fails — which
      # would turn a PASSING scan into a red build. Composite steps can't use
      # continue-on-error, so decide here and skip cleanly instead.
      #
      # We read repo metadata rather than probing /code-scanning/alerts: that endpoint
      # returns 404 "no analysis found" on a perfectly-capable repo that simply hasn't
      # uploaded yet, which would wrongly disable uploads forever.
      run: |
        meta=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}" || echo '{}')
        visibility=$(printf '%s' "$meta" | jq -r '.visibility // empty')
        ghas=$(printf '%s' "$meta" | jq -r '.security_and_analysis.advanced_security.status // empty')
        if [ "$visibility" = "public" ] || [ "$ghas" = "enabled" ]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
          echo "vulngate: code scanning is not available for this repository (it needs a public repo or GitHub Advanced Security) — skipping the SARIF upload. This does NOT affect the scan result."
        fi

    - name: Upload SARIF
      if: inputs.upload-sarif == 'true' && steps.codescanning.outputs.available == 'true' && always()
      uses: github/codeql-action/upload-sarif@4187e74d05793876e9989daffde9c3e66b4acd07  # v3
      with:
        sarif_file: vulngate.sarif

    - name: PR comment
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: python "${{ github.action_path }}/action/scripts/pr_comment.py" findings.json

    - name: Enforce threshold
      shell: bash
      env:
        VG_FAIL_ON: ${{ inputs.fail-on }}
      run: |
        # Re-evaluate AFTER diff-filter/triage so those affect the verdict.
        vulngate gate findings.json --fail-on "$VG_FAIL_ON"
