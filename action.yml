name: "vulngate"
description: "Agent-neutral security checks before you ship — SAST, secrets, and dependency audit as a merge gate."
branding:
  icon: "shield"
  color: "red"

inputs:
  paths:
    description: "Path to scan"
    default: "."
  fail-on:
    description: "Severity threshold that fails the check (critical|high|medium|low)"
    default: "high"
  config:
    description: "Path to a vulngate config file (optional)"
    default: ""
  comment:
    description: "Post/update a single PR comment with findings"
    default: "true"
  upload-sarif:
    description: "Upload SARIF to the GitHub Security tab"
    default: "true"
  diff-only:
    description: "Limit findings to files changed in this PR (focus the comment/gate; avoids failing on pre-existing debt)"
    default: "false"
  install-gitleaks:
    description: "Install gitleaks for secret scanning"
    default: "true"
  anthropic-api-key:
    description: "OPTIONAL — your own Anthropic API key for LLM triage (BYO-inference). Empty = skipped, free tier stays fully useful."
    default: ""
  anthropic-model:
    description: "Model for LLM triage when a key is provided"
    default: "claude-opus-4-8"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install vulngate + scanners
      shell: bash
      # Install from the action's own checkout — self-contained, no PyPI dependency,
      # and always the version pinned by the `uses:` ref.
      run: pip install "${{ github.action_path }}[scanners]"

    - name: Install gitleaks
      if: inputs.install-gitleaks == 'true'
      shell: bash
      env:
        GITLEAKS_VERSION: "8.30.1"   # pinned; verified against the release's checksums
      run: |
        set -euo pipefail
        file="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
        base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
        curl -sSfL "$base/$file" -o "$file"
        curl -sSfL "$base/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o gl_checksums.txt
        grep " ${file}\$" gl_checksums.txt | sha256sum -c -
        tar -xzf "$file" -C /usr/local/bin gitleaks
        gitleaks version

    - name: Scan
      id: scan
      shell: bash
      env:                          # inputs via env, never interpolated into the shell
        VG_PATHS: ${{ inputs.paths }}
        VG_FAIL_ON: ${{ inputs.fail-on }}
        VG_CONFIG: ${{ inputs.config }}
      run: |
        set +e
        args=(scan "$VG_PATHS" --fail-on "$VG_FAIL_ON" --json findings.json --sarif vulngate.sarif --no-color)
        [ -n "$VG_CONFIG" ] && args+=(--config "$VG_CONFIG")
        vulngate "${args[@]}"
        echo "scan_exit=$?" >> "$GITHUB_OUTPUT"

    - name: Diff filter (PR-changed files only)
      if: inputs.diff-only == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: python "${{ github.action_path }}/action/scripts/diff_filter.py" findings.json

    - name: LLM triage (optional, BYO key)
      if: inputs.anthropic-api-key != ''
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        ANTHROPIC_MODEL: ${{ inputs.anthropic-model }}
      run: |
        pip install anthropic >/dev/null
        python "${{ github.action_path }}/action/scripts/triage.py" findings.json

    - name: Upload SARIF
      if: inputs.upload-sarif == 'true' && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: vulngate.sarif

    - name: PR comment
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: python "${{ github.action_path }}/action/scripts/pr_comment.py" findings.json

    - name: Enforce threshold
      shell: bash
      env:
        VG_FAIL_ON: ${{ inputs.fail-on }}
      run: |
        # Re-evaluate AFTER diff-filter/triage so those affect the verdict.
        vulngate gate findings.json --fail-on "$VG_FAIL_ON"
